# =============================================================================
# agentes-24h-final — Docker Compose
# Sistema de agentes autônomos 24/7 com 50+ ferramentas MCP
#
# PROFILES disponíveis para economizar recursos:
#   core  → redis + key-manager + worker + scheduler  (mínimo)
#   llm   → ollama (LLM local grátis)
#   ui    → flower + mcp-gateway (interfaces web)
#   full  → tudo
#
# Uso:
#   docker compose --profile core --profile ui up -d    # recomendado
#   docker compose --profile full up -d                 # tudo
# =============================================================================

name: agentes-24h-final

version: "3.9"

# ---------------------------------------------------------------------------
# Volumes persistentes
# ---------------------------------------------------------------------------
volumes:
  redis_data:
  ollama_data:
  data_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/logs
  data_repos:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/repos

# ---------------------------------------------------------------------------
# Rede isolada
# ---------------------------------------------------------------------------
networks:
  agents_net:
    driver: bridge

# ---------------------------------------------------------------------------
# Secrets (arquivos em ./secrets/ com permissão 600 no host)
# ---------------------------------------------------------------------------
secrets:
  openrouter_key:
    file: ./secrets/openrouter_key.txt
  groq_key:
    file: ./secrets/groq_key.txt
  togetherai_key:
    file: ./secrets/togetherai_key.txt
  fireworksai_key:
    file: ./secrets/fireworksai_key.txt
  google_oauth_token:
    file: ./secrets/google_oauth_token.json
  firecrawl_key:
    file: ./secrets/firecrawl_key.txt
  github_token:
    file: ./secrets/github_token.txt

# =============================================================================
# Serviços
# =============================================================================
services:

  # ── Redis (CORE) ─────────────────────────────────────────────────────────
  # Broker Celery + cache. RAM: 256MB.
  redis:
    image: redis:7-alpine
    container_name: agents_redis
    restart: unless-stopped
    profiles: ["core", "full"]
    command: >
      redis-server
      --maxmemory 200mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --save 60 1
    volumes:
      - redis_data:/data
    networks:
      - agents_net
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Key Manager (CORE) ────────────────────────────────────────────────────
  # Expõe secrets de forma segura. RAM: 128MB.
  key-manager:
    build:
      context: ./key-manager
      dockerfile: Dockerfile
    container_name: agents_key_manager
    restart: unless-stopped
    profiles: ["core", "full"]
    secrets:
      - openrouter_key
      - groq_key
      - togetherai_key
      - fireworksai_key
      - google_oauth_token
      - firecrawl_key
      - github_token
    environment:
      KM_HOST: "0.0.0.0"
      KM_PORT: "8100"
      KM_AUTH_TOKEN: ${KM_AUTH_TOKEN}
    networks:
      - agents_net
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Scheduler (CORE) ──────────────────────────────────────────────────────
  # Celery Beat — dispara tarefas recorrentes. RAM: 256MB.
  scheduler:
    build:
      context: ./scheduler
      dockerfile: Dockerfile
    container_name: agents_scheduler
    restart: unless-stopped
    profiles: ["core", "full"]
    depends_on:
      redis:
        condition: service_healthy
      key-manager:
        condition: service_healthy
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      KM_URL: http://key-manager:8100
      KM_AUTH_TOKEN: ${KM_AUTH_TOKEN}
      GIT_REPO_PATH: /data/repos
      GIT_USER_EMAIL: ${GIT_USER_EMAIL:-agents@localhost}
      GIT_USER_NAME: ${GIT_USER_NAME:-Agente Autonomo}
      # Intervalos ajustáveis — padrão conservador para free tier
      TASK_FIX_BUGS_INTERVAL: ${TASK_FIX_BUGS_INTERVAL:-3600}
      TASK_ADD_FEATURE_INTERVAL: ${TASK_ADD_FEATURE_INTERVAL:-7200}
      TASK_REFACTOR_INTERVAL: ${TASK_REFACTOR_INTERVAL:-14400}
      TASK_PEN_TEST_INTERVAL: ${TASK_PEN_TEST_INTERVAL:-86400}
      TASK_IMPROVE_SELF_INTERVAL: ${TASK_IMPROVE_SELF_INTERVAL:-43200}
    volumes:
      - data_repos:/data/repos
      - data_logs:/data/logs
    networks:
      - agents_net
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # ── Worker (CORE) ─────────────────────────────────────────────────────────
  # Executor Celery. RAM: 512MB. 2 réplicas.
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    restart: unless-stopped
    profiles: ["core", "full"]
    depends_on:
      redis:
        condition: service_healthy
      key-manager:
        condition: service_healthy
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      KM_URL: http://key-manager:8100
      KM_AUTH_TOKEN: ${KM_AUTH_TOKEN}
      OLLAMA_URL: http://ollama:11434
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GIT_REPO_PATH: /data/repos
      GIT_USER_EMAIL: ${GIT_USER_EMAIL:-agents@localhost}
      GIT_USER_NAME: ${GIT_USER_NAME:-Agente Autonomo}
      OLLAMA_DEFAULT_MODEL: ${OLLAMA_DEFAULT_MODEL:-phi3:mini}
    volumes:
      - data_repos:/data/repos
      - data_logs:/data/logs
    networks:
      - agents_net
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ── Ollama (LLM profile) ─────────────────────────────────────────────────
  # LLM local — grátis, sem rate-limit. RAM: 1.5GB.
  # Use phi3:mini (~2GB) ou tinyllama (~1GB) para economizar RAM.
  ollama:
    image: ollama/ollama:latest
    container_name: agents_ollama
    restart: unless-stopped
    profiles: ["llm", "full"]
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - agents_net
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 512M
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 15
        ollama pull ${OLLAMA_DEFAULT_MODEL:-phi3:mini} || true
        wait

  # ── MCP Server (UI profile) ──────────────────────────────────────────────
  # Protocolo MCP via stdio — para Claude Code/OpenCode. RAM: 128MB.
  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: agents_mcp
    restart: unless-stopped
    profiles: ["ui", "full"]
    depends_on:
      key-manager:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KM_URL: http://key-manager:8100
      KM_AUTH_TOKEN: ${KM_AUTH_TOKEN}
      CELERY_BROKER_URL: redis://redis:6379/0
      OLLAMA_URL: http://ollama:11434
      GIT_REPO_PATH: /data/repos
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - data_repos:/data/repos
      - data_logs:/data/logs
    networks:
      - agents_net
    stdin_open: true
    tty: false
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # ── MCP Gateway HTTP (UI profile) ────────────────────────────────────────
  # Dashboard web + REST API + PWA mobile. Porta 8080. RAM: 256MB.
  mcp-gateway:
    build:
      context: .
      dockerfile: ./mcp-gateway/Dockerfile
    container_name: agents_mcp_gateway
    restart: unless-stopped
    profiles: ["ui", "full"]
    depends_on:
      key-manager:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${MCP_GATEWAY_PORT:-8080}:8080"
    environment:
      KM_URL: http://key-manager:8100
      KM_AUTH_TOKEN: ${KM_AUTH_TOKEN}
      CELERY_BROKER_URL: redis://redis:6379/0
      OLLAMA_URL: http://ollama:11434
      GIT_REPO_PATH: /data/repos
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MCP_GATEWAY_PORT: "8080"
    volumes:
      - data_repos:/data/repos
      - data_logs:/data/logs
    networks:
      - agents_net
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  # ── Flower (UI profile) ──────────────────────────────────────────────────
  # Monitor do Celery em http://localhost:5555. RAM: 128MB.
  flower:
    image: mher/flower:2.0
    container_name: agents_flower
    restart: unless-stopped
    profiles: ["ui", "full"]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      FLOWER_PORT: "5555"
      FLOWER_BASIC_AUTH: ${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-changeme}
    ports:
      - "5555:5555"
    networks:
      - agents_net
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

# =============================================================================
# Resumo de RAM por profile:
#   core  → redis(256) + key-manager(128) + scheduler(256) + worker×2(1024) = ~1.7GB
#   llm   → ollama(1536)                                                    = ~1.5GB
#   ui    → mcp-server(256) + mcp-gateway(256) + flower(128)               = ~640MB
#   full  → ~3.9GB total (requer ≥5GB RAM disponível)
# =============================================================================
